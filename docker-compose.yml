services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: support_copilot
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d support_copilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    command: npm run dev
    environment:
      NODE_ENV: development
      APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/support_copilot
      REDIS_URL: redis://redis:6379
      AI_PROVIDER: mock
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: 10
      DEBUG_MODE: "true"
      SUPPORT_MATCH_THRESHOLD: 0
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:3000/api/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build: .
    command: npm run worker:dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/support_copilot
      REDIS_URL: redis://redis:6379
      AI_PROVIDER: mock
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: 10
      DEBUG_MODE: "true"
      SUPPORT_MATCH_THRESHOLD: 0
    volumes:
      - .:/app
      - /app/node_modules
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  uploads:
